<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WFS LabelFlow</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main>
      <header class="hero">
        <div>
          <p class="eyebrow">本机处理 · 文件不外传</p>
          <h1>WFS LabelFlow</h1>
          <p class="lede">上传 ZIP + Excel，先校验，再确认生成 ZIP。</p>
        </div>
        <button id="clear-all" class="danger" type="button">清空全部上传</button>
      </header>

      <section id="error-summary" class="notice error" hidden aria-live="assertive"></section>

      <form id="upload-form">
        <section class="upload-grid">
          <article class="upload-card" data-field="label_zip">
            <div class="card-heading">
              <h2>标签 ZIP</h2>
              <button class="clear-file ghost" type="button">清空</button>
            </div>
            <label class="dropzone">
              <span>选择包含 WFS PDF/TXT 与货代 PDF 的 ZIP</span>
              <input name="label_zip" type="file" accept=".zip">
            </label>
            <ul class="file-list" aria-label="已选 ZIP 文件"></ul>
          </article>

          <article class="upload-card" data-field="mapping_xlsx">
            <div class="card-heading">
              <h2>对应关系 Excel</h2>
              <button class="clear-file ghost" type="button">清空</button>
            </div>
            <label class="dropzone">
              <span>选择包含「货代单号 / WFS Shipment ID」的 Excel</span>
              <input name="mapping_xlsx" type="file" accept=".xlsx,.xlsm">
            </label>
            <ul class="file-list" aria-label="已选 Excel 文件"></ul>
          </article>
        </section>

        <div class="actions">
          <button id="validate-button" type="submit">校验并预览</button>
        </div>
        <p id="form-status" class="form-status" hidden aria-live="polite"></p>
      </form>

      <section id="preview" hidden>
        <div class="notice success">
          <strong>强校验通过</strong>，请确认货代分配结果。
        </div>
        <table>
          <thead>
            <tr>
              <th>WFS 单号</th>
              <th>货代单号</th>
              <th>WFS PDF</th>
              <th>WFS TXT</th>
              <th>货代 PDF</th>
              <th>对应行号</th>
            </tr>
          </thead>
          <tbody id="preview-rows"></tbody>
        </table>
        <div class="actions">
          <button id="back-button" class="ghost" type="button">返回重新上传</button>
          <button id="confirm-button" type="button">确认并生成 ZIP</button>
        </div>
      </section>

      <section id="result" hidden aria-live="polite">
        <div class="notice success">
          <strong>ZIP 已成功生成。</strong>
          本轮上传和预览已清空，下一轮可安全开始。
        </div>
        <a id="download-link" class="button" href="#">下载 ZIP</a>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
